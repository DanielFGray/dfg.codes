<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-family: system-ui, sans-serif;
    background: #1e1e1e;
    color: #ccc;
  }
  #preview-container {
    flex: 1;
    position: relative;
  }
  #preview-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }
  #status {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #999;
  }
  #terminal {
    height: 120px;
    overflow: auto;
    background: #1a1a2e;
    border-top: 1px solid #333;
    padding: 8px 12px;
    font-family: "Fira Code", "Cascadia Code", "JetBrains Mono", monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  .line-stdout { color: #c9d1d9; white-space: pre-wrap; word-break: break-all; }
  .line-stderr { color: #ff6b6b; white-space: pre-wrap; word-break: break-all; }
  .line-system { color: #69db7c; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
  <div id="preview-container">
    <div id="status">Waiting for files...</div>
  </div>
  <div id="terminal"></div>
  <script type="module" src="/node-preview-entry.js"></script>
</body>
</html>
